services:
  tapedeck:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    container_name: tapedeck
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/data
    environment:
      - TZ=America/New_York
      - TAPEDECK_PORT=8080
      - TAPEDECK_DATA_DIR=/data
