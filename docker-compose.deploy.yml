services:
  tapedeck:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    container_name: tapedeck
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - TAPEDECK_PORT=8080
      - TAPEDECK_DATA_DIR=/data

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    environment:
      - TZ=America/New_York

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=static://202
      - --provider=google
      - --email-domain=*
      - --cookie-secure=true
      - --cookie-domain=tapedeck.us
      - --reverse-proxy=true
      - --skip-provider-button=true
    env_file:
      - .env

volumes:
  caddy_data:
